<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #161618;
  font-family: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #ececf0;
  display: flex; align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
  -webkit-app-region: drag;
  -webkit-font-smoothing: antialiased;
}
.loader { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.progress-track {
  width: 120px; height: 3px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%; width: 0%; background: rgba(59,130,246,0.7);
  border-radius: 2px; transition: width 0.4s ease;
}
.label {
  font-size: 12px; color: #56565a; font-weight: 500;
  letter-spacing: 0.02em; transition: opacity 0.3s;
}
.error { color: #ff9500; font-size: 11px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="loader">
  <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
  <div class="label" id="status">Connecting</div>
  <div class="error" id="error"></div>
</div>
<script>
const bar = document.getElementById('bar');
const status = document.getElementById('status');
const error = document.getElementById('error');
const URL = 'https://momomo-agent.github.io/remote-claw/';

function set(pct, text) {
  bar.style.width = pct + '%';
  status.textContent = text;
}

(async () => {
  set(10, 'Checking network...');
  try {
    const r = await fetch(URL, { method: 'HEAD', cache: 'no-cache' });
    if (!r.ok) throw new Error(r.status);
    set(40, 'Loading UI...');
  } catch (e) {
    set(30, 'Retrying...');
    await new Promise(r => setTimeout(r, 2000));
    try {
      await fetch(URL, { method: 'HEAD', cache: 'no-cache' });
      set(40, 'Loading UI...');
    } catch {
      set(100, 'Using offline mode');
      error.style.display = 'block';
      error.textContent = 'Could not reach server — loading local UI';
      return;
    }
  }
  // Simulate sub-resource loading progress
  set(60, 'Loading components...');
  setTimeout(() => set(80, 'Almost ready...'), 800);
  setTimeout(() => set(95, 'Finishing up...'), 1600);
})();
</script>
</body>
</html>
