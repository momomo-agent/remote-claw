<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #161618;
  font-family: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #ececf0;
  display: flex; align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
  -webkit-app-region: drag;
  -webkit-font-smoothing: antialiased;
}
.container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.progress-track {
  width: 140px; height: 3px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%; width: 0%; background: rgba(59,130,246,0.7);
  border-radius: 2px; transition: width 0.5s ease;
}
.progress-bar.error { background: rgba(255,149,0,0.7); }
.status {
  font-size: 12px; color: #8e8e93; font-weight: 500;
  letter-spacing: 0.02em; text-align: center;
  max-width: 260px; line-height: 1.5;
}
.detail {
  font-size: 10px; color: #3a3a3c; font-weight: 400;
  text-align: center; max-width: 260px;
  min-height: 14px;
}
.retry-btn {
  -webkit-app-region: no-drag;
  background: rgba(59,130,246,0.15); color: #5b9cf6;
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: 6px; padding: 6px 16px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  display: none; transition: all 0.2s;
}
.retry-btn:hover { background: rgba(59,130,246,0.25); }
</style>
</head>
<body>
<div class="container">
  <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
  <div class="status" id="status">Starting...</div>
  <div class="detail" id="detail"></div>
  <button class="retry-btn" id="retry">Retry</button>
</div>
<script>
const bar = document.getElementById('bar');
const status = document.getElementById('status');
const detail = document.getElementById('detail');
const retryBtn = document.getElementById('retry');
const CLOUD = 'https://momomo-agent.github.io/remote-claw/';

function set(pct, msg, det, err) {
  bar.style.width = pct + '%';
  bar.classList.toggle('error', !!err);
  status.textContent = msg;
  detail.textContent = det || '';
}

function showRetry() {
  retryBtn.style.display = 'block';
}

retryBtn.addEventListener('click', () => {
  retryBtn.style.display = 'none';
  checkAndLoad();
});

async function checkAndLoad() {
  set(10, 'Checking network...', '');

  // Step 1: network check
  let reachable = false;
  for (let i = 0; i < 2; i++) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(CLOUD, { method: 'HEAD', cache: 'no-cache', signal: ctrl.signal });
      clearTimeout(timer);
      if (r.ok) { reachable = true; break; }
      set(20, i === 0 ? 'Retrying...' : 'Server error', `HTTP ${r.status}`, true);
    } catch (e) {
      const msg = e.name === 'AbortError' ? 'Timeout (5s)' : e.message;
      set(20, i === 0 ? 'Retrying...' : 'Network unreachable', msg, true);
    }
    if (i === 0) await new Promise(r => setTimeout(r, 2000));
  }

  if (!reachable) {
    set(100, 'Loading offline UI', 'Cloud unreachable — using local fallback');
    showRetry();
    // Tell main process to use local
    if (window.electronAPI) window.electronAPI.invoke('loading-status', 'offline');
    return;
  }

  // Step 2: cloud reachable, main process will load it
  set(50, 'Loading UI...', CLOUD.replace('https://', ''));
  if (window.electronAPI) window.electronAPI.invoke('loading-status', 'online');

  // Step 3: wait for main process to signal completion or failure
  if (window.electronAPI) {
    window.electronAPI.on('loading-progress', (data) => {
      if (data.done) {
        set(100, 'Ready', '');
      } else if (data.error) {
        set(80, 'Load failed', data.error, true);
        showRetry();
      } else if (data.pct) {
        set(data.pct, data.msg || 'Loading...', data.detail || '');
      }
    });
  }

  // Fallback timeout — if no signal from main in 12s
  setTimeout(() => {
    const w = bar.style.width;
    if (w && parseInt(w) < 100) {
      set(90, 'Taking longer than expected...', 'Will fallback to local UI soon');
    }
  }, 12000);
}

checkAndLoad();
</script>
</body>
</html>
