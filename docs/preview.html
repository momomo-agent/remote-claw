<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RemoteClaw — Preview</title>
<style>
:root {
  --bg: #1c1c1e; --bg-secondary: #2c2c2e; --bg-tertiary: #3a3a3c;
  --bg-elevated: #242426; --text: #f5f5f7; --text-secondary: #98989d;
  --text-tertiary: #636366; --accent: #0a84ff; --green: #30d158;
  --separator: rgba(84,84,88,0.35); --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
.container { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 220px; min-width: 180px; background: var(--bg-elevated);
  border-right: 1px solid var(--separator); display: flex; flex-direction: column;
  -webkit-app-region: drag;
}
.sidebar-header {
  padding: 12px 12px 8px; font-size: 11px; font-weight: 600;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
  padding-top: 40px; /* space for traffic lights */
}
.sidebar-tree { flex: 1; overflow-y: auto; padding: 0 4px 8px; -webkit-app-region: no-drag; }
.tree-item {
  display: flex; align-items: center; gap: 6px; padding: 4px 8px;
  border-radius: var(--radius); cursor: pointer; font-size: 12px;
  color: var(--text-secondary); transition: all 0.1s; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.tree-item:hover { background: var(--bg-secondary); color: var(--text); }
.tree-item.active { background: var(--accent); color: #fff; }
.tree-item.dir { color: var(--accent); font-weight: 500; }
.tree-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
.tree-name { overflow: hidden; text-overflow: ellipsis; }
.tree-indent { width: 12px; flex-shrink: 0; }
.sidebar-path {
  padding: 8px 12px; font-size: 10px; color: var(--text-tertiary);
  border-top: 1px solid var(--separator); font-family: "SF Mono", Menlo, monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Content */
.preview { flex: 1; overflow-y: auto; padding: 24px 32px; -webkit-app-region: no-drag; }
.preview.empty-state {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px;
}

/* Markdown styles */
.markdown-body { line-height: 1.7; color: var(--text); }
.markdown-body h1 { font-size: 24px; font-weight: 700; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--separator); }
.markdown-body h2 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--separator); }
.markdown-body h3 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
.markdown-body h4 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; }
.markdown-body p { margin: 8px 0; }
.markdown-body a { color: var(--accent); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code {
  background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px;
  font-family: "SF Mono", Menlo, monospace; font-size: 12px;
}
.markdown-body pre {
  background: var(--bg-secondary); padding: 14px 16px; border-radius: 8px;
  overflow-x: auto; margin: 12px 0;
}
.markdown-body pre code { background: none; padding: 0; font-size: 12px; line-height: 1.5; }
.markdown-body blockquote {
  border-left: 3px solid var(--accent); padding: 4px 16px; margin: 12px 0;
  color: var(--text-secondary); background: var(--bg-elevated); border-radius: 0 var(--radius) var(--radius) 0;
}
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
.markdown-body li { margin: 4px 0; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.markdown-body th, .markdown-body td {
  border: 1px solid var(--separator); padding: 8px 12px; text-align: left;
}
.markdown-body th { background: var(--bg-elevated); font-weight: 600; }
.markdown-body img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
.markdown-body hr { border: none; border-top: 1px solid var(--separator); margin: 20px 0; }
.markdown-body strong { font-weight: 600; }
.markdown-body em { font-style: italic; color: var(--text-secondary); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header">Files</div>
    <div class="sidebar-tree" id="sidebar-tree"></div>
    <div class="sidebar-path" id="sidebar-path"></div>
  </div>
  <div class="preview empty-state" id="preview">Select a file to preview</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
<script src="preview.js"></script>
</body>
</html>
