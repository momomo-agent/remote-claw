<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RemoteClaw — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #161618; --bg-raised: #1e1e21; --bg-surface: #252528;
  --bg-hover: #2a2a2e; --bg-active: #323236;
  --text-primary: #ececf0; --text-secondary: #8e8e93; --text-tertiary: #56565a;
  --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.12);
  --green: #34c759;
  --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.1);
  --radius-xs: 6px;
  --font: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: "Geist Mono", "SF Mono", Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 2px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text-primary);
  font-size: 13px; -webkit-font-smoothing: antialiased; overflow: hidden;
  letter-spacing: -0.01em;
}
.container { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px; min-width: 200px; background: var(--bg-raised);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  -webkit-app-region: drag;
}
.sidebar-header {
  padding: 38px 14px 10px; display: flex; align-items: center; gap: 8px;
}
.sidebar-title {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.02em; flex: 1;
}
.sidebar-btn {
  background: none; border: none; color: var(--text-tertiary); cursor: pointer;
  font-size: 14px; padding: 2px 4px; border-radius: 4px; -webkit-app-region: no-drag;
  transition: all 0.15s;
}
.sidebar-btn:hover { color: var(--text-primary); background: var(--bg-surface); }
.sidebar-tree { flex: 1; overflow-y: auto; padding: 2px 6px 8px; -webkit-app-region: no-drag; }
.tree-item {
  display: flex; align-items: center; gap: 6px; padding: 4px 8px;
  border-radius: var(--radius-xs); cursor: pointer; font-size: 12px;
  color: var(--text-secondary); transition: all 0.12s; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; font-weight: 400;
}
.tree-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.tree-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.tree-item.dir { color: var(--text-primary); font-weight: 500; }
.tree-icon { width: 18px; text-align: center; flex-shrink: 0; font-family: var(--mono); font-size: 9px; color: var(--text-tertiary); }
.tree-icon.emoji { font-family: var(--font); font-size: 14px; }
.tree-name { overflow: hidden; text-overflow: ellipsis; }
.sidebar-path {
  padding: 8px 14px; font-size: 10px; color: var(--text-tertiary);
  border-top: 1px solid var(--border); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Content ── */
.preview {
  flex: 1; overflow-y: auto; padding: 32px 40px;
  -webkit-app-region: no-drag;
}
.preview.empty-state {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px;
}

/* ── Markdown ── */
.markdown-body { line-height: 1.75; color: var(--text-primary); max-width: 720px; }
.markdown-body h1 {
  font-size: 28px; font-weight: 700; margin: 32px 0 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
  letter-spacing: -0.03em;
}
.markdown-body h2 {
  font-size: 22px; font-weight: 600; margin: 28px 0 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  letter-spacing: -0.02em;
}
.markdown-body h3 { font-size: 17px; font-weight: 600; margin: 20px 0 8px; letter-spacing: -0.01em; }
.markdown-body h4 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; }
.markdown-body p { margin: 10px 0; }
.markdown-body a { color: var(--accent); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code {
  background: var(--bg-surface); padding: 2px 7px; border-radius: 5px;
  font-family: var(--mono); font-size: 12px; border: 1px solid var(--border);
}
.markdown-body pre {
  background: var(--bg-raised); padding: 16px 18px; border-radius: 10px;
  overflow-x: auto; margin: 14px 0; border: 1px solid var(--border);
}
.markdown-body pre code {
  background: none; padding: 0; font-size: 12px; line-height: 1.6; border: none;
}
.markdown-body blockquote {
  border-left: 3px solid var(--accent); padding: 6px 18px; margin: 14px 0;
  color: var(--text-secondary); background: var(--bg-raised);
  border-radius: 0 8px 8px 0;
}
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 10px 0; }
.markdown-body li { margin: 5px 0; }
.markdown-body li::marker { color: var(--text-tertiary); }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 14px 0; }
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border-strong); padding: 9px 14px; text-align: left;
}
.markdown-body th { background: var(--bg-raised); font-weight: 600; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.02em; }
.markdown-body img { max-width: 100%; border-radius: 10px; margin: 10px 0; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.markdown-body strong { font-weight: 600; }
.markdown-body em { font-style: italic; color: var(--text-secondary); }

/* Code (non-markdown) */
.code-preview {
  background: var(--bg-raised); padding: 18px 20px; border-radius: 10px;
  overflow: auto; font-family: var(--mono); font-size: 12px;
  line-height: 1.6; color: var(--text-primary); border: 1px solid var(--border);
  white-space: pre-wrap;
}

.loading { text-align: center; padding: 40px; color: var(--text-tertiary); font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.tree-item { animation: fadeIn 0.2s ease-out both; }
.tree-item:nth-child(1) { animation-delay: 0ms; }
.tree-item:nth-child(2) { animation-delay: 20ms; }
.tree-item:nth-child(3) { animation-delay: 40ms; }
.tree-item:nth-child(4) { animation-delay: 60ms; }
.tree-item:nth-child(5) { animation-delay: 80ms; }
.tree-item:nth-child(6) { animation-delay: 100ms; }
.tree-item:nth-child(7) { animation-delay: 120ms; }
.tree-item:nth-child(8) { animation-delay: 140ms; }
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebar-header">Files</span>
      <button class="sidebar-btn" id="btn-refresh" title="Refresh">↻</button>
      <button class="sidebar-btn" id="btn-up" title="Go up">↑</button>
    </div>
    <div class="sidebar-tree" id="sidebar-tree"></div>
    <div class="sidebar-path" id="sidebar-path"></div>
  </div>
  <div class="preview empty-state" id="preview">Select a file to preview</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
<script src="preview.js"></script>
</body>
</html>
