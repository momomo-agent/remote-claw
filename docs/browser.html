<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RemoteClaw Browser</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #232326;
    --surface-hover: #2e2e32;
    --border: #38383d;
    --fg: #e8e8ea;
    --fg-dim: #a0a0a6;
    --accent: #3b82f6;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; font-size: 13px; }
  body { display: flex; flex-direction: column; }

  .toolbar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px 8px 80px; /* 80px for traffic lights */
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 42px;
  }
  .toolbar button, .toolbar input { -webkit-app-region: no-drag; }

  .nav-btn {
    background: transparent;
    border: none;
    color: var(--fg);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--surface-hover); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .url-bar {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    height: 28px;
    gap: 8px;
  }
  .url-bar:focus-within { border-color: var(--accent); }
  .url-lock {
    color: var(--fg-dim);
    font-size: 11px;
    user-select: none;
  }
  .url-lock.secure { color: #22c55e; }
  .url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-size: 12px;
    padding: 0;
  }

  .device-label {
    color: var(--fg-dim);
    font-size: 11px;
    padding: 0 8px;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--fg-dim);
  }
  .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }

  .webview-container {
    flex: 1;
    display: flex;
    position: relative;
    background: #fff;
  }
  webview {
    flex: 1;
    width: 100%;
    height: 100%;
    border: none;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--fg-dim);
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay.error { color: var(--danger); }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="toolbar">
    <button class="nav-btn" id="back" title="Back" disabled>‹</button>
    <button class="nav-btn" id="forward" title="Forward" disabled>›</button>
    <button class="nav-btn" id="reload" title="Reload">⟳</button>
    <div class="url-bar">
      <span class="url-lock" id="urlLock">🌐</span>
      <input class="url-input" id="url" type="text" spellcheck="false" autocomplete="off" placeholder="Enter URL or search">
    </div>
    <span class="device-label">
      <span class="status-dot" id="statusDot"></span>
      <span id="deviceLabel"></span>
    </span>
  </div>
  <div class="webview-container">
    <webview id="wv" allowpopups></webview>
    <div class="overlay" id="overlay">
      <div class="spinner" id="spinner" style="display:none"></div>
      <span id="overlayText">Loading…</span>
    </div>
  </div>

<script>
  const qs = new URLSearchParams(location.search);
  const device = qs.get('device') || '';
  const initialUrl = qs.get('url') || 'http://localhost:3000/';

  document.getElementById('deviceLabel').textContent = device ? `via ${device}` : 'local';
  document.title = `Browser — ${device || 'local'}`;

  const wv = document.getElementById('wv');
  const backBtn = document.getElementById('back');
  const fwdBtn = document.getElementById('forward');
  const reloadBtn = document.getElementById('reload');
  const urlInput = document.getElementById('url');
  const urlLock = document.getElementById('urlLock');
  const statusDot = document.getElementById('statusDot');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const spinner = document.getElementById('spinner');

  let userEditing = false;

  // Parse a user-entered URL. Supports:
  //   https://github.com      -> as-is
  //   github.com              -> https://github.com
  //   localhost:3000          -> http://localhost:3000
  //   192.168.1.5:5173/app    -> http://192.168.1.5:5173/app
  //   /search?q=foo           -> ddg search? for now just prepend https://duckduckgo.com
  //   some words              -> duckduckgo search
  function normalizeUrl(raw) {
    const s = (raw || '').trim();
    if (!s) return null;
    if (/^https?:\/\//i.test(s)) return s;
    // looks like a host (no spaces, has a dot or :port)
    if (!/\s/.test(s) && (/\./.test(s) || /:\d+/.test(s) || s === 'localhost' || s.startsWith('localhost:'))) {
      // private ranges + localhost default to http; public hosts get https
      const isPrivate = /^(localhost|127\.|192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/i.test(s);
      return (isPrivate ? 'http://' : 'https://') + s;
    }
    // fallback: search
    return 'https://duckduckgo.com/?q=' + encodeURIComponent(s);
  }

  function showOverlay(text, isError = false, showSpinner = false) {
    overlayText.textContent = text;
    overlay.classList.toggle('show', true);
    overlay.classList.toggle('error', isError);
    spinner.style.display = showSpinner ? 'inline-block' : 'none';
  }
  function hideOverlay() { overlay.classList.remove('show', 'error'); }

  function updateLock(url) {
    if (url && url.startsWith('https://')) {
      urlLock.textContent = '🔒';
      urlLock.classList.add('secure');
    } else {
      urlLock.textContent = '🌐';
      urlLock.classList.remove('secure');
    }
  }

  function updateBar() {
    if (userEditing) return;
    try {
      const u = wv.getURL();
      if (!u) return;
      urlInput.value = u;
      updateLock(u);
    } catch {}
  }

  async function refreshStatus() {
    try {
      const r = await window.electronAPI.invoke('browser-get-proxy-port', { device });
      statusDot.classList.toggle('connected', !!r?.connected);
    } catch {}
  }

  function navigate(raw) {
    const url = normalizeUrl(raw);
    if (!url) return;
    updateLock(url);
    wv.src = url;
  }

  // Nav buttons
  backBtn.addEventListener('click', () => { if (wv.canGoBack()) wv.goBack(); });
  fwdBtn.addEventListener('click', () => { if (wv.canGoForward()) wv.goForward(); });
  reloadBtn.addEventListener('click', () => wv.reload());

  // URL input
  let imeComposing = false;
  urlInput.addEventListener('focus', () => { userEditing = true; urlInput.select(); });
  urlInput.addEventListener('blur', () => { userEditing = false; updateBar(); });
  urlInput.addEventListener('compositionstart', () => { imeComposing = true; });
  urlInput.addEventListener('compositionend', () => { imeComposing = false; });
  urlInput.addEventListener('keydown', (e) => {
    // Ignore Enter while IME candidate window is open (keyCode 229 on Chromium)
    if (imeComposing || e.isComposing || e.keyCode === 229) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      userEditing = false;
      navigate(urlInput.value);
      urlInput.blur();
    } else if (e.key === 'Escape') {
      updateBar();
      urlInput.blur();
    }
  });

  // Webview lifecycle
  wv.addEventListener('did-start-loading', () => {
    reloadBtn.textContent = '×';
    reloadBtn.title = 'Stop';
    showOverlay('Loading…', false, true);
  });
  wv.addEventListener('did-stop-loading', () => {
    reloadBtn.textContent = '⟳';
    reloadBtn.title = 'Reload';
    backBtn.disabled = !wv.canGoBack();
    fwdBtn.disabled = !wv.canGoForward();
    updateBar();
    hideOverlay();
  });
  wv.addEventListener('did-fail-load', (e) => {
    if (e.errorCode === -3) return; // aborted on redirect
    showOverlay(`Load failed: ${e.errorDescription || e.errorCode}`, true, false);
  });
  wv.addEventListener('page-title-updated', (e) => {
    document.title = `${e.title} — ${device || 'local'}`;
  });
  wv.addEventListener('did-navigate', (e) => { urlInput.value = e.url; updateLock(e.url); });
  wv.addEventListener('did-navigate-in-page', (e) => { urlInput.value = e.url; updateLock(e.url); });

  // Ctrl/Cmd+L focuses URL bar
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'l') {
      e.preventDefault();
      urlInput.focus();
    }
  });

  // Init
  urlInput.value = initialUrl;
  updateLock(initialUrl);
  wv.src = initialUrl;
  refreshStatus();
  setInterval(refreshStatus, 3000);
</script>
</body>
</html>
