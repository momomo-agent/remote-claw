<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RemoteClaw</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
:root {
  --bg: #1c1c1e;
  --bg-secondary: #2c2c2e;
  --bg-tertiary: #3a3a3c;
  --bg-elevated: #242426;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #636366;
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --separator: rgba(84,84,88,0.35);
  --radius: 10px;
  --radius-sm: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  overflow: hidden;
  user-select: none;
  -webkit-app-region: drag;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Title bar ── */
.titlebar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 8px;
  -webkit-app-region: drag;
  position: relative;
}
.titlebar-left { display: flex; align-items: center; gap: 8px; }
.status-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  cursor: pointer; -webkit-app-region: no-drag;
  transition: all 0.2s;
}
.status-indicator.on { background: var(--green); box-shadow: 0 0 8px rgba(48,209,88,0.5); }
.status-indicator.off { background: var(--red); box-shadow: 0 0 8px rgba(255,69,58,0.3); }
.titlebar-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  letter-spacing: -0.2px;
}
.titlebar-right { display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; }
.device-select {
  background: var(--bg-secondary); border: 1px solid var(--separator);
  color: var(--text-secondary); padding: 4px 8px; border-radius: var(--radius-sm);
  font-size: 11px; outline: none; font-family: inherit;
  -webkit-app-region: no-drag;
}
.device-select:focus { border-color: var(--accent); }
.device-title {
  background: transparent; border: none; color: var(--text);
  font-size: 13px; font-weight: 600; letter-spacing: -0.2px;
  padding: 2px 4px; cursor: pointer;
}
.device-title:focus { outline: none; }
.pin-close {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg-tertiary); border: none; color: var(--text-tertiary);
  font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1;
  -webkit-app-region: no-drag;
}
.pin-close:hover { background: var(--red); color: #fff; }

/* ── Tab bar ── */
.tabbar {
  display: flex; gap: 2px; padding: 0 12px 8px;
  -webkit-app-region: no-drag;
}
.tabbar-item {
  padding: 5px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500; color: var(--text-tertiary);
  cursor: pointer; transition: all 0.15s;
}
.tabbar-item:hover { color: var(--text-secondary); background: var(--bg-secondary); }
.tabbar-item.active { color: var(--text); background: var(--bg-secondary); }

/* ── Content ── */
.content {
  flex: 1; overflow-y: auto; -webkit-app-region: no-drag;
}

/* ── Cards ── */
.card {
  background: var(--bg-elevated); border-radius: var(--radius);
  margin: 0 12px 8px; overflow: hidden;
}
.card-header {
  padding: 10px 14px; font-size: 11px; font-weight: 600;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-row {
  display: flex; align-items: center; padding: 10px 14px;
  border-top: 1px solid var(--separator); cursor: pointer;
  transition: background 0.1s;
}
.card-row:first-child { border-top: none; }
.card-row:hover { background: var(--bg-secondary); }
.card-row:active { background: var(--bg-tertiary); }

/* ── Device list ── */
.device-row { gap: 10px; }
.device-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg-secondary); display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.device-info { flex: 1; min-width: 0; }
.device-name { font-size: 13px; font-weight: 500; }
.device-detail { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.device-status { text-align: right; }
.device-online { font-size: 10px; color: var(--green); font-weight: 500; }
.device-uptime { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }

/* ── History ── */
.history-row { flex-direction: column; align-items: flex-start; gap: 4px; cursor: default; }
.history-cmd {
  font-family: "SF Mono", Menlo, monospace; font-size: 12px;
  color: var(--text); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; width: 100%;
}
.history-meta { display: flex; gap: 8px; font-size: 10px; color: var(--text-tertiary); }
.history-badge {
  padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600;
}
.badge-done { background: rgba(48,209,88,0.15); color: var(--green); }
.badge-error { background: rgba(255,69,58,0.15); color: var(--red); }
.badge-timeout { background: rgba(255,159,10,0.15); color: var(--orange); }
.badge-running { background: rgba(10,132,255,0.15); color: var(--accent); }

/* ── Terminal (exec) ── */
.terminal { display: flex; flex-direction: column; height: 100%; }
.term-output {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-family: "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.6;
}
.term-line { white-space: pre-wrap; word-break: break-all; }
.term-cmd { color: var(--text); margin-top: 6px; }
.term-prompt { color: var(--accent); margin-right: 6px; font-weight: 600; }
.term-stdout { color: #d1d1d6; }
.term-stderr { color: var(--red); opacity: 0.85; }
.term-info { color: var(--text-tertiary); font-size: 10px; }
.term-error { color: var(--red); }
.term-input-row {
  display: flex; align-items: center; padding: 10px 14px;
  background: var(--bg-elevated); border-top: 1px solid var(--separator);
  font-family: "SF Mono", Menlo, monospace; font-size: 12px;
}
.term-input {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-family: inherit; font-size: inherit; outline: none; margin-left: 6px;
}
.term-input:disabled { opacity: 0.3; }
.term-input::placeholder { color: var(--text-tertiary); }

/* ── Shell (xterm) ── */
.shell-container { flex: 1; display: flex; flex-direction: column; height: 100%; }
.shell-bar {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--bg-elevated); border-bottom: 1px solid var(--separator);
  -webkit-app-region: no-drag;
}
.shell-btn {
  background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--separator);
  padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.shell-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.shell-btn:disabled { opacity: 0.3; cursor: default; }
.shell-status { margin-left: auto; font-size: 11px; }
#xterm-container { flex: 1; padding: 4px; }
#xterm-container .xterm { height: 100%; }

/* ── Files ── */
.files-toolbar {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--bg-elevated); border-bottom: 1px solid var(--separator);
  -webkit-app-region: no-drag;
}
.files-path {
  flex: 1; font-family: "SF Mono", Menlo, monospace; font-size: 11px;
  color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
.files-btn {
  background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--separator);
  padding: 4px 8px; border-radius: var(--radius-sm); font-size: 11px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.files-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.file-row { gap: 10px; }
.file-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-name.dir { color: var(--accent); }
.file-meta { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
.file-size { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }

/* ── Settings ── */
.settings { padding: 12px; -webkit-app-region: no-drag; }
.settings-section {
  background: var(--bg-elevated); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px;
}
.settings-label {
  font-size: 11px; color: var(--text-secondary); font-weight: 500;
  margin-bottom: 6px;
}
.settings-input {
  width: 100%; background: var(--bg-secondary); border: 1px solid var(--separator);
  color: var(--text); padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: 12px; outline: none; font-family: "SF Mono", Menlo, monospace;
  margin-bottom: 12px;
}
.settings-input:last-child { margin-bottom: 0; }
.settings-input:focus { border-color: var(--accent); }
.settings-input::placeholder { color: var(--text-tertiary); }
.settings-note { font-size: 10px; color: var(--text-tertiary); margin-top: -8px; margin-bottom: 12px; }
.settings-save {
  width: 100%; background: var(--accent); color: #fff; border: none;
  padding: 10px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.settings-save:hover { background: var(--accent-hover); }
.settings-saved { color: var(--green); font-size: 11px; text-align: center; margin-top: 8px; display: none; }

/* ── Empty state ── */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; color: var(--text-tertiary); gap: 8px;
}
.empty-icon { font-size: 32px; opacity: 0.5; }
.empty-text { font-size: 13px; }

/* ── Detached window ── */
.detached-titlebar {
  display: flex; align-items: center; padding: 10px 16px;
  -webkit-app-region: drag; gap: 8px;
}
.detached-titlebar select { -webkit-app-region: no-drag; }

/* ── Loading ── */
.loading { text-align: center; padding: 20px; color: var(--text-tertiary); font-size: 12px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="app.js"></script>
</body>
</html>
