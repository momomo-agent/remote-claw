<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RemoteClaw — Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
:root {
  --bg: #161618; --bg-raised: #1e1e21; --bg-surface: #252528;
  --bg-hover: #2a2a2e; --bg-active: #323236;
  --text-primary: #ececf0; --text-secondary: #8e8e93; --text-tertiary: #56565a;
  --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.12);
  --green: #34c759; --green-dim: rgba(52,199,89,0.12);
  --red: #ff3b30; --orange: #ff9500;
  --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.1);
  --radius-xs: 6px;
  --font: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: "Geist Mono", "SF Mono", Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 2px; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); font-size: 13px; overflow: hidden; -webkit-font-smoothing: antialiased; }

.layout { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px; min-width: 200px; background: var(--bg-raised);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  -webkit-app-region: drag;
}
.sidebar-header {
  padding: 38px 14px 8px; display: flex; align-items: center; gap: 8px;
  -webkit-app-region: drag;
}
.sidebar-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); flex: 1; letter-spacing: 0.02em; text-transform: uppercase; }
.sidebar-btn {
  background: none; border: none; color: var(--text-tertiary); cursor: pointer;
  font-size: 14px; padding: 2px 4px; border-radius: 4px; -webkit-app-region: no-drag;
  transition: all 0.15s;
}
.sidebar-btn:hover { color: var(--text-primary); background: var(--bg-surface); }
.sidebar-tree { flex: 1; overflow-y: auto; padding: 2px 6px 8px; -webkit-app-region: no-drag; }
.tree-item {
  display: flex; align-items: center; gap: 6px; padding: 3px 8px;
  border-radius: var(--radius-xs); cursor: pointer; font-size: 12px;
  color: var(--text-secondary); transition: all 0.1s; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; font-family: var(--font);
}
.tree-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.tree-item.active { background: var(--accent-dim); color: var(--accent); }
.tree-item.dir { color: var(--text-primary); font-weight: 500; }
.tree-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.tree-name { overflow: hidden; text-overflow: ellipsis; }
.tree-indent { display: inline-block; width: 14px; flex-shrink: 0; }
.sidebar-path {
  padding: 8px 14px; font-size: 10px; color: var(--text-tertiary);
  border-top: 1px solid var(--border); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Main area ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Tab bar */
.editor-tabs {
  display: flex; background: var(--bg-raised); border-bottom: 1px solid var(--border);
  overflow-x: auto; min-height: 36px; align-items: flex-end;
  -webkit-app-region: drag;
}
.editor-tab {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  font-size: 12px; color: var(--text-tertiary); cursor: pointer;
  border-right: 1px solid var(--border); white-space: nowrap;
  transition: all 0.15s; font-family: var(--font); font-weight: 500;
  -webkit-app-region: no-drag; letter-spacing: -0.01em;
}
.editor-tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
.editor-tab.active { color: var(--text-primary); background: var(--bg); border-bottom: 2px solid var(--accent); }
.editor-tab.modified .tab-name::after { content: " •"; color: var(--orange); }
.tab-close {
  font-size: 10px; color: var(--text-tertiary); cursor: pointer;
  width: 16px; height: 16px; border-radius: 4px; display: flex;
  align-items: center; justify-content: center; transition: all 0.1s;
}
.tab-close:hover { background: var(--bg-active); color: var(--text-primary); }

/* Editor */
.editor-container { flex: 1; position: relative; }
#monaco-editor { width: 100%; height: 100%; }
.editor-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-tertiary); font-size: 14px;
}

/* Status bar */
.statusbar {
  display: flex; align-items: center; padding: 3px 14px; gap: 16px;
  background: var(--bg-raised); border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-tertiary); font-family: var(--mono);
}
.statusbar-item { display: flex; align-items: center; gap: 4px; }
.statusbar-right { margin-left: auto; display: flex; gap: 16px; }
.status-saved { color: var(--green); }
.status-modified { color: var(--orange); }

/* Terminal panel */
.terminal-panel {
  height: 200px; background: var(--bg); border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.terminal-header {
  display: flex; align-items: center; padding: 4px 14px; gap: 8px;
  background: var(--bg-raised); border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-secondary); font-weight: 500;
}
.terminal-header button {
  background: none; border: none; color: var(--text-tertiary); cursor: pointer;
  font-size: 12px; margin-left: auto; padding: 2px 6px; border-radius: 4px;
}
.terminal-header button:hover { color: var(--text-primary); background: var(--bg-surface); }
#editor-xterm { flex: 1; padding: 4px; }
.terminal-panel.collapsed { height: 28px; }
.terminal-panel.collapsed #editor-xterm { display: none; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebar-title">Files</span>
      <button class="sidebar-btn" id="btn-refresh" title="Refresh">↻</button>
      <button class="sidebar-btn" id="btn-up" title="Go up">↑</button>
    </div>
    <div class="sidebar-tree" id="sidebar-tree"></div>
    <div class="sidebar-path" id="sidebar-path">~</div>
  </div>
  <div class="main">
    <div class="editor-tabs" id="editor-tabs">
      <div class="editor-empty" style="padding:0 14px;font-size:11px;color:var(--text-tertiary);-webkit-app-region:drag;flex:1">Open a file from the sidebar</div>
    </div>
    <div class="editor-container" id="editor-container">
      <div class="editor-empty">Select a file to edit</div>
    </div>
    <div class="statusbar" id="statusbar">
      <span class="statusbar-item" id="status-file">No file</span>
      <div class="statusbar-right">
        <span class="statusbar-item" id="status-lang">Plain Text</span>
        <span class="statusbar-item" id="status-pos">Ln 1, Col 1</span>
      </div>
    </div>
    <div class="terminal-panel" id="terminal-panel">
      <div class="terminal-header">
        <span>Terminal</span>
        <button id="btn-toggle-term">▼</button>
      </div>
      <div id="editor-xterm"></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
// Save xterm refs before Monaco's AMD loader hijacks define
window._Terminal = Terminal;
window._FitAddon = FitAddon;
</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script src="editor.js"></script>
</body>
</html>
